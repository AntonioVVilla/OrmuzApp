version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - javascript
    groups:
      react-native:
        patterns:
          - 'react-native*'
          - '@react-native*'
      eslint:
        patterns:
          - 'eslint*'
          - '@typescript-eslint/*'
      jest:
        patterns:
          - 'jest*'
          - '@types/jest'
          - 'ts-jest'

  - package-ecosystem: gradle
    directory: /android
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - android

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    labels:
      - dependencies
      - ci

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: '06:00'
      timezone: Europe/Madrid
    labels:
      - dependencies
      - docker
