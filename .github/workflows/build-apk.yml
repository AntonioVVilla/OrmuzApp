name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      release:
        description: 'Create a GitHub Release with the APK'
        required: false
        default: 'false'
        type: boolean

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build Release APK
        working-directory: android
        run: chmod +x gradlew && ./gradlew assembleRelease --no-daemon

      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=1.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Rename APK
        run: |
          mv android/app/build/outputs/apk/release/app-release.apk \
             OrmuzApp-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: OrmuzApp-v${{ steps.version.outputs.version }}
          path: OrmuzApp-v${{ steps.version.outputs.version }}.apk
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v') || inputs.release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          name: OrmuzApp v${{ steps.version.outputs.version }}
          body: |
            ## OrmuzApp v${{ steps.version.outputs.version }}

            Mapa de precios de gasolina en tiempo real para España.

            ### Instalacion
            1. Descarga `OrmuzApp-v${{ steps.version.outputs.version }}.apk` abajo
            2. Activa "Instalar desde origenes desconocidos" en tu dispositivo Android
            3. Abre el archivo APK para instalar

            ### Requisitos
            - Android 7.0 (API 24) o superior
            - Permisos de ubicacion para detectar tu provincia

            ---
            *Built automatically via GitHub Actions*
            *Vibecoded with [Claude](https://claude.ai)*
          files: OrmuzApp-v${{ steps.version.outputs.version }}.apk
          draft: false
          prerelease: false
          generate_release_notes: true
