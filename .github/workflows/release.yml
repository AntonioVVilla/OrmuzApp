name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag for ad-hoc release (e.g. 1.1.0)'
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    name: Build, sign, publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm test -- --ci --maxWorkers=2

      - uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: gradle/actions/setup-gradle@v6

      # Signing material. Keystore is stored as a base64-encoded
      # GitHub secret so binary content survives the env-var
      # transit. It's decoded to a workspace path right before
      # gradle picks it up.
      - name: Materialise release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -z "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "::error::RELEASE_KEYSTORE_BASE64 secret is not configured."
            echo "::error::Add it in Settings → Secrets → Actions before running release."
            exit 1
          fi
          mkdir -p "$RUNNER_TEMP/signing"
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > "$RUNNER_TEMP/signing/release.keystore"
          echo "RELEASE_STORE_FILE=$RUNNER_TEMP/signing/release.keystore" >> "$GITHUB_ENV"

      - name: Assemble signed release APK and AAB
        working-directory: android
        env:
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        # We build BOTH formats in a single gradle invocation:
        #   * APKs (per-ABI split) — published to the GitHub Release
        #     for side-loading / direct distribution. Keep shipping
        #     these so `curl | install` still works.
        #   * AAB  — the required upload format for Google Play
        #     Console. Play re-signs with the app signing key and
        #     generates per-device APKs on the fly, so we do NOT
        #     need to produce split AABs on our side.
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleRelease :app:bundleRelease --no-daemon

      - name: Resolve version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> "$GITHUB_OUTPUT"
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            VERSION="${{ inputs.version }}"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
            echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Stage artifacts
        id: artifacts
        run: |
          mkdir -p dist
          cp android/app/build/outputs/apk/release/*.apk dist/
          # The AAB is emitted under bundle/release/app-release.aab by
          # default — rename it so the version is on the filename, to
          # match the APK / mapping / SBOM naming pattern.
          cp android/app/build/outputs/bundle/release/app-release.aab \
             "dist/ormuzapp-${{ steps.version.outputs.version }}.aab"
          cp android/app/build/outputs/mapping/release/mapping.txt \
             "dist/mapping-${{ steps.version.outputs.version }}.txt" || true
          ls -la dist/

      - name: Generate SBOM (SPDX)
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          output-file: dist/sbom-${{ steps.version.outputs.version }}.spdx.json
          upload-artifact: false

      - name: Upload release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ormuzapp-release-${{ steps.version.outputs.version }}
          path: dist/
          retention-days: 365

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: OrmuzApp ${{ steps.version.outputs.tag }}
          body: |
            ## OrmuzApp ${{ steps.version.outputs.tag }}

            Mapa de precios de combustible en España (datos
            oficiales del Ministerio de Industria).

            ### Instalación
            1. Descarga el APK para tu arquitectura (`arm64-v8a`
               cubre la mayoría de dispositivos modernos).
            2. Activa "Instalar desde fuentes desconocidas".
            3. Abre el APK para instalar.

            ### Requisitos
            - Android 7.0 (API 24) o superior.
            - Permiso de ubicación (`ACCESS_FINE_LOCATION`) para
              detectar tu provincia.

            ### Artefactos adjuntos
            - `*.apk` — binario firmado, uno por ABI (side-load).
            - `ormuzapp-*.aab` — Android App Bundle para Google Play
              Console (re-firmado por Play App Signing en el servidor).
            - `mapping-*.txt` — tabla ProGuard para symbolicar
              crash reports.
            - `sbom-*.spdx.json` — Software Bill of Materials
              (SPDX 2.3).

            ---
            *Built & signed by GitHub Actions.*
          files: |
            dist/*.apk
            dist/*.aab
            dist/mapping-*.txt
            dist/sbom-*.spdx.json
          draft: false
          prerelease: false
          generate_release_notes: true
